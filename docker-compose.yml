services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ais_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: python run.py
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ais_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8010:8010"
    depends_on:
      - postgres
      - redis

  celery:
    build: .
    command: celery -A config worker --loglevel=info
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ais_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
